name: PAR Decision
description: DHCR Petition for Administrative Review decision documents

fields:
  petitioner:
    type: string
    description: Name of the petitioner

  petitioner_type:
    type: enum
    values: [Owner, Tenant]
    description: Whether petitioner is the owner or tenant

  other_party:
    type: string
    description: The opposing party's name

  adm_review_docket:
    type: string
    description: Administrative review / PAR docket number

  ra_docket:
    type: string
    description: Rent Administrator's docket number(s), comma-separated if multiple

  address:
    type: string
    description: Street address including borough/city

  apartment:
    type: string
    description: Apartment number, or 'Various' for building-wide cases

  determination:
    type: enum
    values: [Denied, Granted, Granted in Part, Dismissed, Revoked, Modified, Rescinded, Remanded, Terminated]
    description: PAR outcome

  ra_determination:
    type: enum
    values: [Granted, Denied, Granted in Part, Terminated]
    description: What the Rent Administrator originally decided

  par_filed_date:
    type: date
    description: Date the PAR was filed

  ra_order_issued:
    type: date
    description: Date the RA order was issued

  ra_case_filed:
    type: date
    description: Date the original RA complaint was filed

  issue_date:
    type: date
    description: Date from the ISSUED stamp
